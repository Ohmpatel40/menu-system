<!DOCTYPE html>
<html>
<head>
  <title>Menu Dashboard</title>
</head>
<body>

<h2>Upload Image</h2>

<input type="file" id="fileInput">
<select id="screen">
  <option value="tv1">TV 1</option>
  <option value="tv2">TV 2</option>
</select>

<button onclick="upload()">Upload</button>

<script>
const TOKEN = "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";
const REPO = "ohmpatel40/menu-system";

async function upload() {
  const file = document.getElementById("fileInput").files[0];
  const screen = document.getElementById("screen").value;

  const reader = new FileReader();

  reader.onload = async function() {
    const content = reader.result.split(",")[1];

    // 1. Upload image
    await fetch(`https://api.github.com/repos/${REPO}/contents/images/${file.name}`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Upload image",
        content: content
      })
    });

    // 2. Get existing JSON
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${screen}.json`, {
      headers: { "Authorization": "token " + TOKEN }
    });

    const data = await res.json();
    const json = JSON.parse(atob(data.content));

    // 3. Add new image
    json.images.push("images/" + file.name);

    // 4. Update JSON
    await fetch(`https://api.github.com/repos/${REPO}/contents/${screen}.json`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Update menu",
        content: btoa(JSON.stringify(json, null, 2)),
        sha: data.sha
      })
    });

    alert("Uploaded & Updated!");
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
