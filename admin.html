<!DOCTYPE html>
<html>
<head>
  <title>Menu Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { margin-top: 30px; }

    .container {
      display: flex;
      gap: 20px;
    }

    .tv-box {
      width: 48%;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      background: black;
      color: white;
      border-radius: 5px;
    }

    input {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>📊 Menu Dashboard</h1>

<!-- PREVIEW SECTION -->
<div class="container">
  <div class="tv-box">
    <h2>TV 1 Preview</h2>
    <iframe src="tv1.html"></iframe>
    <button onclick="refreshTV('tv1')">Refresh TV 1</button>
  </div>

  <div class="tv-box">
    <h2>TV 2 Preview</h2>
    <iframe src="tv2.html"></iframe>
    <button onclick="refreshTV('tv2')">Refresh TV 2</button>
  </div>
</div>

<hr>

<!-- UPLOAD SECTION -->
<h2>Upload Menu Image</h2>

<input type="file" id="fileInput"><br><br>

<button onclick="upload('tv1')">Upload to TV 1</button>
<button onclick="upload('tv2')">Upload to TV 2</button>

<script>
const TOKEN = "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";
const REPO = "ohmpatel40/menu-system";

async function upload(screen) {
  const file = document.getElementById("fileInput").files[0];
  if(!file){
    alert("Select a file first");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function() {
    const content = reader.result.split(",")[1];

    // Upload image
    await fetch(`https://api.github.com/repos/${REPO}/contents/images/${file.name}`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Upload image",
        content: content
      })
    });

    // Get existing JSON
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${screen}.json`, {
      headers: { "Authorization": "token " + TOKEN }
    });

    const data = await res.json();
    const json = JSON.parse(atob(data.content));

    // Add new image
    json.images.push("images/" + file.name);

    // Update JSON
    await fetch(`https://api.github.com/repos/${REPO}/contents/${screen}.json`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Update " + screen,
        content: btoa(JSON.stringify(json, null, 2)),
        sha: data.sha
      })
    });

    alert("Uploaded to " + screen.toUpperCase());

    refreshTV(screen);
  };

  reader.readAsDataURL(file);
}

function refreshTV(screen){
  const iframes = document.querySelectorAll("iframe");
  
  if(screen === 'tv1'){
    iframes[0].src = iframes[0].src;
  } else {
    iframes[1].src = iframes[1].src;
  }
}
</script>

</body>
</html>
