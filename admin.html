<!DOCTYPE html>
<html>
<head>
  <title>Menu Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .tv-box {
      width: 48%;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    input {
      margin-bottom: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

<h1>📊 Menu Dashboard</h1>

<div class="container">

  <!-- TV 1 -->
  <div class="tv-box">
    <h2>TV 1</h2>
    <iframe id="tv1Frame" src="tv1.html"></iframe>

    <input type="file" id="file1">
    <button onclick="upload('tv1', 'file1')">Upload to TV 1</button>
  </div>

  <!-- TV 2 -->
  <div class="tv-box">
    <h2>TV 2</h2>
    <iframe id="tv2Frame" src="tv2.html"></iframe>

    <input type="file" id="file2">
    <button onclick="upload('tv2', 'file2')">Upload to TV 2</button>
  </div>

</div>

<script>
const TOKEN = "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";
const REPO = "ohmpatel40/menu-system";

async function upload(screen, inputId) {
  const file = document.getElementById(inputId).files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function() {
    const content = reader.result.split(",")[1];

    // 1. Upload image to GitHub
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/images/${file.name}`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Upload image",
        content: content
      })
    });

const result = await res.json();
console.log(result);

if (!res.ok) {
  alert("Upload failed: " + result.message);
  return;
}

    // 2. Get JSON
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${screen}.json`, {
      headers: { "Authorization": "token " + TOKEN }
    });

    const data = await res.json();
    const json = JSON.parse(atob(data.content));

    // 3. Add image to list
    json.images.push("images/" + file.name);

    // 4. Update JSON
    await fetch(`https://api.github.com/repos/${REPO}/contents/${screen}.json`, {
      method: "PUT",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Update " + screen,
        content: btoa(JSON.stringify(json, null, 2)),
        sha: data.sha
      })
    });

    alert("Uploaded to " + screen.toUpperCase());

    // Refresh preview
    refresh(screen);
  };

  reader.readAsDataURL(file);
}

function refresh(screen) {
  if (screen === 'tv1') {
    document.getElementById("tv1Frame").src += "";
  } else {
    document.getElementById("tv2Frame").src += "";
  }
}
</script>

</body>
</html>
